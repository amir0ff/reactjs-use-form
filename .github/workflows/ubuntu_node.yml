name: Test, Build & Deploy
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test_build_deploy:
    permissions:
      contents: write
      id-token: write
    env:
      CI: true
      GENERATE_SOURCEMAP: false
      INPUT_TOKEN: ''
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Get latest source code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: 🗑️ Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      
      - name: 🔄 Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      
      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: 🧪 Run tests suite
        run: pnpm run test
      
      - name: 🏗️ Build main package
        run: pnpm run build
      
      - name: 🚚 Publish to NPM
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: packages/main
        run: |
          echo "//registry.npmjs.org/:_authToken=" > .npmrc
          npm publish --provenance --access public
      
      - name: 🏗️ Build example app
        run: pnpm run build:example
      
      - name: 🚀 Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.6.8
        with:
          branch: gh-pages
          folder: packages/examples/build/
